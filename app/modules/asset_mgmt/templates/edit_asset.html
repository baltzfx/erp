{% extends "layout_dashboard.html" %}

{% block title %}Edit Asset{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-8">
    <div class="flex items-center gap-4">
        <a href="/assets" hx-boost="true" class="p-2 rounded-xl hover:bg-primary/10 text-primary transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <div>
            <h1 class="text-2xl text-text-main tracking-tight">Edit <span class="text-primary italic">Asset</span></h1>
            <p class="text-text-main opacity-50 text-sm mt-1">Update asset information</p>
        </div>
    </div>

    <form method="POST" action="/assets/{{ asset.id }}/edit" class="bg-bg-main border border-primary/10 shadow-xl rounded-2xl p-8 space-y-8">
        
        <div>
            <label class="block text-sm font-bold text-text-main mb-4">Asset Type *</label>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                {% for type in asset_types %}
                <label class="relative flex items-center justify-center p-4 border border-primary/20 rounded-xl cursor-pointer hover:bg-primary/5 transition-all">
                    <input type="radio" name="asset_type" value="{{ type.value }}" class="peer sr-only" {% if asset.asset_type.value == type.value %}checked{% endif %} onchange="updateFormFields()">
                    <div class="text-sm font-bold text-text-main opacity-70 peer-checked:opacity-100 peer-checked:text-primary">{{ type.value }}</div>
                    <div class="absolute inset-0 border-2 border-transparent peer-checked:border-primary rounded-xl transition-all pointer-events-none"></div>
                </label>
                {% endfor %}
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-bold text-text-main mb-2">Asset Name *</label>
                <input type="text" name="name" value="{{ asset.name }}" required class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all">
            </div>

            <div>
                <label class="block text-sm font-bold text-text-main mb-2">Category *</label>
                <select name="category_id" required class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if asset.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-text-main mb-2">Serial Number / Asset Tag</label>
                <input type="text" name="serial_number" value="{{ asset.serial_number or '' }}" class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all">
            </div>

            <div>
                <label class="block text-sm font-bold text-text-main mb-2">Current Status *</label>
                <select name="status" required class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                    {% for status in asset_statuses %}
                    <option value="{{ status.value }}" {% if asset.status.value == status.value %}selected{% endif %}>{{ status.value }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-text-main mb-2">Location</label>
                <input type="text" name="location" value="{{ asset.location or '' }}" class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all">
            </div>

            <div id="field_parent_asset" class="hidden">
                <label class="block text-sm font-bold text-text-main mb-2">Parent Asset</label>
                <select name="parent_asset_id" class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                    <option value="">None (Top-Level Asset)</option>
                    {% for a in all_assets %}
                        {% if a.id != asset.id and a.asset_type.value not in ['COMPONENT', 'CONSUMABLE'] %}
                        <option value="{{ a.id }}" {% if asset.parent_asset_id == a.id %}selected{% endif %}>{{ a.name }} ({{ a.serial_number or 'No SN' }})</option>
                        {% endif %}
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-bold text-text-main mb-2">Purchase Date</label>
                <input type="date" name="purchase_date" value="{{ asset.purchase_date or '' }}" class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all">
            </div>
            <div>
                <label class="block text-sm font-bold text-text-main mb-2">Purchase Cost</label>
                <input type="number" step="0.01" name="purchase_cost" value="{{ asset.purchase_cost or '' }}" class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-bold text-text-main mb-2">Salvage Value</label>
                <input type="number" step="0.01" name="salvage_value" value="{{ asset.salvage_value or '' }}" class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="0.00">
            </div>
            <div>
                <label class="block text-sm font-bold text-text-main mb-2">Useful Life (Years)</label>
                <input type="number" name="useful_life_years" value="{{ asset.useful_life_years or '' }}" class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="e.g. 5">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div id="field_total_seats" class="hidden">
                <label class="block text-sm font-bold text-text-main mb-2">Total Seats (Licenses)</label>
                <input type="number" name="total_seats" value="{{ asset.total_seats or '' }}" class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all">
            </div>
            <div id="field_quantity" class="hidden">
                <label class="block text-sm font-bold text-text-main mb-2">Quantity (Consumables)</label>
                <input type="number" name="quantity" value="{{ asset.quantity or '' }}" class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all">
            </div>
        </div>

        <div>
            <label class="block text-sm font-bold text-text-main mb-2">Description / Notes</label>
            <textarea name="description" rows="3" class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all">{{ asset.description or '' }}</textarea>
        </div>

        <div class="flex justify-end pt-4 border-t border-primary/10">
            <button type="submit" class="px-6 py-2.5 bg-primary text-white rounded-xl font-bold hover:opacity-90 shadow-lg shadow-primary/20 transition-all">
                Update Asset
            </button>
        </div>
    </form>

    <script>
        function updateFormFields() {
            const assetType = document.querySelector('input[name="asset_type"]:checked').value;
            
            const fieldParentAsset = document.getElementById('field_parent_asset');
            const fieldTotalSeats = document.getElementById('field_total_seats');
            const fieldQuantity = document.getElementById('field_quantity');
            
            fieldParentAsset.classList.add('hidden');
            fieldTotalSeats.classList.add('hidden');
            fieldQuantity.classList.add('hidden');
            
            if (assetType === 'COMPONENT' || assetType === 'ACCESSORY') {
                fieldParentAsset.classList.remove('hidden');
            } else if (assetType === 'LICENSE') {
                fieldTotalSeats.classList.remove('hidden');
            } else if (assetType === 'CONSUMABLE') {
                fieldQuantity.classList.remove('hidden');
            }
        }

        document.addEventListener("DOMContentLoaded", updateFormFields);
    </script>
</div>
{% endblock %}
