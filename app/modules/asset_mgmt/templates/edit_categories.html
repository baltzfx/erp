{% extends "layout_dashboard.html" %}

{% block title %}Edit Asset Category{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-8">
    <div class="flex items-center gap-4">
        <a href="/asset-categories" hx-boost="true" class="p-2 rounded-xl hover:bg-primary/10 text-primary transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <div>
            <h1 class="text-2xl text-text-main tracking-tight">Edit <span class="text-primary italic">Category</span></h1>
            <p class="text-text-main opacity-50 text-sm mt-1">Modify category details</p>
        </div>
    </div>

    <form method="POST" action="/asset-categories/{{ category.id }}/edit" class="bg-bg-main border border-primary/10 shadow-xl rounded-2xl p-8 space-y-6">
        <div>
            <label class="block text-sm font-bold text-text-main mb-2">Category Name</label>
            <input type="text" name="name" value="{{ category.name }}" required class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all">
        </div>
        
        <div>
            <label class="block text-sm font-bold text-text-main mb-2">Description</label>
            <textarea name="description" rows="3" class="w-full bg-bg-main border border-primary/20 rounded-xl px-4 py-2.5 text-text-main focus:border-primary focus:ring-1 focus:ring-primary transition-all">{{ category.description or '' }}</textarea>
        </div>

        <div class="flex justify-end pt-4 border-t border-primary/10">
            <button type="submit" class="px-6 py-2.5 bg-primary text-white rounded-xl font-bold hover:opacity-90 shadow-lg shadow-primary/20 transition-all">
                Update Category
            </button>
        </div>
    </form>
</div>
{% endblock %}
