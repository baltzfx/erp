{% extends "layout_auth.html" %}

{% block title %}Login{% endblock %}

{% block auth_content %}
<div class="w-full max-w-md p-8 bg-bg-main rounded-2xl border border-primary shadow-2xl">
    <div class="text-center mb-8">
        <span class="text-4xl">⚡</span>
        <h1 class="text-2xl font-bold mt-4">Welcome Back</h1>
        <p class="text-sm opacity-70">Please enter your details to sign in</p>
    </div>

    <div id="error-message" class="hidden mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm font-bold">
    </div>

    <form hx-post="/auth/login" 
          hx-target="#error-message" 
          hx-swap="innerHTML"
          hx-on::before-request="document.getElementById('error-message').classList.add('hidden')"
          hx-on::response-error="document.getElementById('error-message').classList.remove('hidden'); document.getElementById('error-message').innerText = event.detail.xhr.response ? JSON.parse(event.detail.xhr.response).detail : 'Login failed'"
          class="space-y-6">
        <div>
            <label class="block text-sm font-medium mb-2">Email Address</label>
            <input type="email" name="email" required class="w-full px-4 py-2 rounded-lg bg-bg-main border border-primary focus:ring-2 focus:ring-primary focus:outline-hidden transition" placeholder="admin@example.com">
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">Password</label>
            <input type="password" name="password" required class="w-full px-4 py-2 rounded-lg bg-bg-main border border-primary focus:ring-2 focus:ring-primary focus:outline-hidden transition" placeholder="••••••••">
        </div>

        <div class="flex items-center justify-between text-sm">
            <label class="flex items-center cursor-pointer">
                <input type="checkbox" class="rounded border-primary text-primary focus:ring-primary mr-2">
                Remember me
            </label>
            <a href="#" class="text-primary hover:underline">Forgot password?</a>
        </div>

        <button type="submit" class="w-full py-2.5 bg-primary text-white rounded-lg font-bold hover:opacity-90 transition shadow-lg shadow-primary/20">
            Sign In
        </button>
    </form>

    <p class="mt-8 text-center text-sm opacity-70">
        Don't have an account? 
        <a href="/auth/register" class="text-primary font-bold hover:underline">Sign up for free</a>
    </p>
</div>
{% endblock %}
