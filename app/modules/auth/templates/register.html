{% extends "layout_auth.html" %}

{% block title %}Register - AdminPanel{% endblock %}

{% block auth_content %}
<div class="text-center mb-10">
    <h1 class="text-4xl font-black tracking-tight">Get Started</h1>
    <p class="opacity-50 mt-2 font-medium">Join the next generation of admin control</p>
</div>

<div class="p-10 bg-bg-main rounded-3xl border border-primary/20 shadow-2xl">
    <div id="error-message" class="hidden mb-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-xl text-sm font-bold shadow-sm">
    </div>

    <form hx-post="/auth/register" 
          hx-target="#error-message" 
          hx-swap="innerHTML"
          hx-on::before-request="document.getElementById('error-message').classList.add('hidden')"
          hx-on::response-error="document.getElementById('error-message').classList.remove('hidden'); document.getElementById('error-message').innerText = event.detail.xhr.response ? JSON.parse(event.detail.xhr.response).detail : 'Registration failed'"
          class="space-y-6">
        
        <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="block text-xs font-black uppercase tracking-widest opacity-50 ml-1">First Name</label>
                <input type="text" name="first_name" required 
                    class="w-full px-5 py-3.5 rounded-2xl bg-bg-main border-2 border-primary/10 focus:border-primary focus:outline-hidden transition-all font-bold placeholder:opacity-30" 
                    placeholder="John">
            </div>
            <div class="space-y-2">
                <label class="block text-xs font-black uppercase tracking-widest opacity-50 ml-1">Last Name</label>
                <input type="text" name="last_name" required 
                    class="w-full px-5 py-3.5 rounded-2xl bg-bg-main border-2 border-primary/10 focus:border-primary focus:outline-hidden transition-all font-bold placeholder:opacity-30" 
                    placeholder="Doe">
            </div>
        </div>

        <div class="space-y-2">
            <label class="block text-xs font-black uppercase tracking-widest opacity-50 ml-1">Username</label>
            <input type="text" name="username" required 
                class="w-full px-5 py-3.5 rounded-2xl bg-bg-main border-2 border-primary/10 focus:border-primary focus:outline-hidden transition-all font-bold placeholder:opacity-30" 
                placeholder="johndoe">
        </div>

        <div class="space-y-2">
            <label class="block text-xs font-black uppercase tracking-widest opacity-50 ml-1">Email Address</label>
            <input type="email" name="email" required 
                class="w-full px-5 py-3.5 rounded-2xl bg-bg-main border-2 border-primary/10 focus:border-primary focus:outline-hidden transition-all font-bold placeholder:opacity-30" 
                placeholder="admin@example.com">
        </div>

        <div class="space-y-2">
            <label class="block text-xs font-black uppercase tracking-widest opacity-50 ml-1">Password</label>
            <input type="password" name="password" required 
                class="w-full px-5 py-3.5 rounded-2xl bg-bg-main border-2 border-primary/10 focus:border-primary focus:outline-hidden transition-all font-bold placeholder:opacity-30" 
                placeholder="••••••••">
        </div>

        <button type="submit" class="w-full py-4 bg-primary text-white rounded-2xl font-black text-lg hover:opacity-90 active:scale-95 transition-all shadow-xl shadow-primary/20">
            Create Account
        </button>
    </form>

    <div class="mt-8 pt-8 border-t border-primary/10 text-center">
        <p class="text-sm font-bold opacity-60">
            Already have an account? 
            <a href="/auth/login" class="text-primary hover:underline ml-1">Sign In</a>
        </p>
    </div>
</div>
{% endblock %}
