{% extends "layout_dashboard.html" %}

{% block title %}Add Leave Request{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto p-6">
    <div class="mb-8">
        <h1 class="text-3xl font-black text-text-main tracking-tight">Add New <span class="text-primary italic">Leave</span></h1>
        <p class="text-text-main opacity-50 text-sm mt-1">Submit a leave request for an employee</p>
    </div>

    <form action="/leave/create" method="POST" class="bg-bg-main border border-primary/10 shadow-xl rounded-2xl p-8 space-y-6">
        <div class="space-y-4">
            <div class="space-y-1">
                <label class="block text-xs font-black uppercase tracking-widest text-text-main opacity-40">Employee ID</label>
                <input type="number" name="employee_id" required placeholder="Employee ID"
                    class="block w-full px-4 py-3 bg-primary/5 border border-primary/10 rounded-xl text-text-main focus:ring-2 focus:ring-primary outline-none transition-all">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="block text-xs font-black uppercase tracking-widest text-text-main opacity-40">Start Date</label>
                    <input type="date" name="start_date" required
                        class="block w-full px-4 py-3 bg-primary/5 border border-primary/10 rounded-xl text-text-main focus:ring-2 focus:ring-primary outline-none transition-all">
                </div>
                <div class="space-y-1">
                    <label class="block text-xs font-black uppercase tracking-widest text-text-main opacity-40">End Date</label>
                    <input type="date" name="end_date" required
                        class="block w-full px-4 py-3 bg-primary/5 border border-primary/10 rounded-xl text-text-main focus:ring-2 focus:ring-primary outline-none transition-all">
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-xs font-black uppercase tracking-widest text-text-main opacity-40">Leave Type</label>
                <select name="leave_type" required class="block w-full px-4 py-3 bg-primary/5 border border-primary/10 rounded-xl text-text-main focus:ring-2 focus:ring-primary outline-none transition-all">
                    {% for type in leave_types %}
                        <option value="{{ type.value }}">{{ type.value }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="space-y-1">
                <label class="block text-xs font-black uppercase tracking-widest text-text-main opacity-40">Reason</label>
                <textarea name="reason" placeholder="Optional notes for this leave" rows="3"
                    class="block w-full px-4 py-3 bg-primary/5 border border-primary/10 rounded-xl text-text-main focus:ring-2 focus:ring-primary outline-none transition-all"></textarea>
            </div>
        </div>

        <div class="flex justify-end gap-4 pt-6 border-t border-primary/5">
            <a href="/leave/" hx-target="#main-content" hx-select="#main-content" class="px-6 py-3 text-text-main opacity-40 hover:opacity-100 font-bold transition-all uppercase tracking-widest text-xs flex items-center">Cancel</a>
            <button type="submit" class="px-8 py-3 bg-primary text-white rounded-xl font-bold hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-primary/20">
                Submit Leave
            </button>
        </div>
    </form>
</div>
{% endblock %}
