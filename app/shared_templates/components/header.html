<!-- Top Header Navigation -->
<header class="bg-bg-main border-b border-border-main flex items-center px-6 min-h-[65px] justify-between">
  <h2 class="font-semibold text-text-main">Workspace Dashboard</h2>
  <div class="flex items-center gap-4">
    
    {% include 'components/theme_switcher.html' %}

    {% if user %}   
    <!-- User Info Text Layout -->
    <div class="text-right hidden sm:block">
      <div class="text-xs text-text-main group-hover:text-opacity-80 transition-colors">
        {{ user.first_name }} {{ user.last_name }}
      </div>
      <div class="text-[10px] text-text-muted uppercase tracking-widest">
        {{ user.username }}
      </div>
    </div>
    <!-- Wrapper container with Alpine.js state management -->
    <div x-data="{ open: false }" @click.outside="open = false" class="relative inline-block text-left pl-4 border-l border-border-main">

      <!-- Clickable Avatar Button -->
      <button @click="open = !open" type="button" class="flex items-center gap-3 focus:outline-none group">
        <!-- Circular Avatar Element (Shows first character of username/first_name) -->
        <div class="h-8 w-8 rounded-full bg-text-main text-bg-main flex items-center justify-center font-bold text-xs uppercase shadow-sm border border-border-main group-hover:scale-105 transition-transform">
          {% if user.first_name %}
            {{ user.first_name[0] }}
          {% else %}
            {{ user.username[0] }}
          {% endif %}
        </div>
      </button>

      <!-- Floating Dropdown Window -->
      <div 
        x-show="open"
        x-transition:enter="transition ease-out duration-100"
        x-transition:enter-start="transform opacity-0 scale-95"
        x-transition:enter-end="transform opacity-100 scale-100"
        x-transition:leave="transition ease-in duration-75"
        x-transition:leave-start="transform opacity-100 scale-100"
        x-transition:leave-end="transform opacity-0 scale-95"
        class="absolute right-0 mt-2 w-48 origin-top-right rounded-md bg-bg-surface shadow-dropdown ring-1 ring-border-main focus:outline-none z-50 overflow-hidden divide-y divide-border-main"
        style="display: none;"
      >
        <!-- Profile Selection Option -->
        <div class="py-1">
          <a 
            href="/users/{{ user.id }}/edit" 
            class="group flex items-center px-4 py-2 text-sm text-text-main hover:bg-bg-hover transition-colors w-full text-left"
            hx-target="#main-content"
            hx-select="#main-content"
          >
            <svg class="mr-3 h-4 w-4 text-text-muted group-hover:text-text-main" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
            Profile
          </a>
        </div>

        <!-- Account Logout Option -->
        <div class="py-1">
          <a href="/auth/logout" class="group flex items-center px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/30 transition-colors w-full text-left">
            <svg class="mr-3 h-4 w-4 text-red-400 group-hover:text-red-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15" />
            </svg>
            Logout
          </a>
        </div>
      </div>

    </div>
    {% else %}
    <span class="hidden sm:block text-sm text-text-muted">Session Active</span>
    {% endif %}
  </div>
</header>
