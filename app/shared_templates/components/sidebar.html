<!-- ================= SIDEBAR ================= -->
<aside :class="isSidebarOpen ? 'w-64' : 'w-20'"
  class="flex flex-col bg-bg-surface text-text-main h-full border-e border-border-main shrink-0 transition-all duration-300">

  <!-- Sidebar Header & Toggle Button -->
  <div class="p-4 flex items-center justify-between border-b border-border-main min-h-[65px]">
    <a href="/" class="flex items-center gap-x-3 overflow-hidden hover:opacity-80 transition" hx-target="#main-content"
      hx-select="#main-content">
      <span class="text-xl shrink-0">⚡</span>
      <span x-show="isSidebarOpen" x-transition.opacity class="font-bold text-lg whitespace-nowrap">
        AdminPanel
      </span>
    </a>

    <!-- Toggle Sidebar Button -->
    <button @click="isSidebarOpen = !isSidebarOpen"
      class="p-1.5 rounded-lg bg-bg-hover text-text-muted hover:text-text-main transition focus:outline-hidden">
      <svg x-show="isSidebarOpen" class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6" />
      </svg>
      <svg x-show="!isSidebarOpen" class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m9 18 6-6-6-6" />
      </svg>
    </button>
  </div>

  <!-- Navigation Menu Wrapper -->
  <nav class="p-3 w-full flex flex-col flex-wrap overflow-y-auto" hx-target="#main-content" hx-select="#main-content"
    hx-swap="innerHTML">
    <ul class="flex flex-col space-y-1">

      <!-- Dashboard Link -->
      <li>
        <a class="flex items-center gap-x-3.5 py-2 px-2.5 text-sm text-text-muted rounded-lg hover:bg-bg-hover hover:text-text-main transition focus:outline-hidden"
          href="/dashboard/" hx-target="#main-content" hx-select="#main-content">
          <svg class="shrink-0 w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          <span x-show="isSidebarOpen" x-transition.opacity class="whitespace-nowrap">Dashboard</span>
        </a>
      </li>

      <!-- User Link -->
      <li x-data="{ open: false }">
        <button @click="open = !open"
          class="w-full flex items-center gap-x-3.5 py-2 px-2.5 text-sm text-text-muted rounded-lg hover:bg-bg-hover hover:text-text-main transition focus:outline-hidden">
          <svg class="shrink-0 w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          <span x-show="isSidebarOpen" x-transition.opacity class="whitespace-nowrap">User Management</span>

          <svg x-show="isSidebarOpen" class="ms-auto size-4 transition-transform duration-200"
            :class="open ? 'rotate-90' : ''" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6" />
          </svg>
        </button>

        <div x-show="open && isSidebarOpen" x-collapse>
          <ul class="pt-1 ps-8 space-y-1">
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/users/">Users</a></li>
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/roles/">Roles</a></li>
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/permissions/">Permissions</a></li>
          </ul>
        </div>
      </li>

      <!-- Employee Link -->
      <li x-data="{ open: false }">
        <button @click="open = !open"
          class="w-full flex items-center gap-x-3.5 py-2 px-2.5 text-sm text-text-muted rounded-lg hover:bg-bg-hover hover:text-text-main transition focus:outline-hidden">
          <svg class="shrink-0 w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          <span x-show="isSidebarOpen" x-transition.opacity class="whitespace-nowrap">Employee Management</span>

          <svg x-show="isSidebarOpen" class="ms-auto size-4 transition-transform duration-200"
            :class="open ? 'rotate-90' : ''" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6" />
          </svg>
        </button>

        <div x-show="open && isSidebarOpen" x-collapse>
          <ul class="pt-1 ps-8 space-y-1">
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/employees/">Employees</a></li>
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/branch/">Branches</a></li>
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/department/">Org Units</a></li>

          </ul>
        </div>
      </li>

      <!-- Time & Attendance Link -->
      <li x-data="{ open: false }">
        <button @click="open = !open"
          class="w-full flex items-center gap-x-3.5 py-2 px-2.5 text-sm text-text-muted rounded-lg hover:bg-bg-hover hover:text-text-main transition focus:outline-hidden">
          <svg class="shrink-0 w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
          <span x-show="isSidebarOpen" x-transition.opacity class="whitespace-nowrap">Time & Attendance</span>

          <svg x-show="isSidebarOpen" class="ms-auto size-4 transition-transform duration-200"
            :class="open ? 'rotate-90' : ''" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6" />
          </svg>
        </button>

        <div x-show="open && isSidebarOpen" x-collapse>
          <ul class="pt-1 ps-8 space-y-1">
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/attendance/">Attendance</a></li>
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/shifts/">Shifts</a></li>
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/leave/">Leave Requests</a></li>
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/holiday/">Holidays</a></li>
          </ul>
        </div>
      </li>

      <!-- Asset Management Link -->
      <li x-data="{ open: false }">
        <button @click="open = !open"
          class="w-full flex items-center gap-x-3.5 py-2 px-2.5 text-sm text-text-muted rounded-lg hover:bg-bg-hover hover:text-text-main transition focus:outline-hidden">
          <svg class="shrink-0 w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <!-- Portfolio / Asset Folder -->
            <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8L10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z" />
            <!-- Management / Growth Trend Line -->
            <path d="M6 14l4-4 4 4 4-4" />
            <circle cx="18" cy="10" r="1" fill="currentColor" />
          </svg>
          <span x-show="isSidebarOpen" x-transition.opacity class="whitespace-nowrap">Asset Management</span>

          <svg x-show="isSidebarOpen" class="ms-auto size-4 transition-transform duration-200"
            :class="open ? 'rotate-90' : ''" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6" />
          </svg>
        </button>

        <div x-show="open && isSidebarOpen" x-collapse>
          <ul class="pt-1 ps-8 space-y-1">
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/assets/">Assets</a></li>
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/asset-categories/">Categories</a></li>
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/assets/requests">All Requests</a></li>
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/assets/my-requests">My Requests</a></li>
          </ul>
        </div>
      </li>

      <!-- Account Accordion -->
      <li x-data="{ open: false }">
        <button @click="open = !open"
          class="w-full flex items-center gap-x-3.5 py-2 px-2.5 text-sm text-text-muted rounded-lg hover:bg-bg-hover hover:text-text-main transition focus:outline-hidden">
          <svg class="shrink-0 w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="15" r="3" />
            <circle cx="9" cy="7" r="4" />
            <path d="M10 15H6a4 4 0 0 0-4 4v2" />
            <path d="m21.7 16.4-.9-.3" />
            <path d="m15.2 13.9-.9-.3" />
            <path d="m16.6 18.7.3-.9" />
            <path d="m19.1 12.2.3-.9" />
            <path d="m19.6 18.7-.4-1" />
            <path d="m16.8 12.3-.4-1" />
            <path d="m14.3 16.6 1-.4" />
            <path d="m20.7 13.8 1-.4" />
          </svg>
          <span x-show="isSidebarOpen" x-transition.opacity class="whitespace-nowrap">Account</span>

          <svg x-show="isSidebarOpen" class="ms-auto size-4 transition-transform duration-200"
            :class="open ? 'rotate-90' : ''" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6" />
          </svg>
        </button>

        <div x-show="open && isSidebarOpen" x-collapse>
          <ul class="pt-1 ps-8 space-y-1">
            <li><a
                class="flex items-center gap-x-3.5 py-1.5 px-2.5 text-sm text-text-muted hover:text-primary rounded-md"
                href="/users/{{ user.id }}/view">Profile</a></li>
          </ul>
        </div>
      </li>

    </ul>
  </nav>
</aside>
