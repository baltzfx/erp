{% extends "base.html" %}

{% block body %}
<div class="flex flex-col min-h-screen bg-bg-main text-text-main overflow-hidden">
    <!-- Simplified Auth Header -->
    <header class="p-6 flex justify-between items-center z-20">
        <a href="/" class="flex items-center gap-2 hover:opacity-80 transition group">
            <span class="text-3xl group-hover:scale-110 transition-transform">⚡</span>
            <span class="font-black text-xl tracking-tight">AdminPanel</span>
        </a>
        
        {% include 'components/theme_switcher.html' %}
    </header>

    <main class="flex-1  min-w-0 flex items-center justify-center p-6 relative">
        <!-- Background Elements -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute top-1/4 -left-20 w-80 h-80 bg-primary opacity-[0.03] rounded-full blur-3xl"></div>
            <div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-primary opacity-[0.03] rounded-full blur-3xl"></div>
        </div>

        <div class="w-full max-w-md z-10">
            {% block auth_content %}{% endblock %}
        </div>
    </main>

    <footer class="p-6 text-center text-xs opacity-30 font-bold uppercase tracking-widest">
        &copy; 2026 AdminPanel. All rights reserved.
    </footer>
</div>
{% endblock %}
